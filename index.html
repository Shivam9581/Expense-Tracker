<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger — Simple Expense Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div class="container">

  <h1>Expense Tracker</h1>

  <div class="summary">
    <div class="summary-box income-box">
      <h3>Total Income</h3>
      <p id="totalIncomeText">$0.00</p>
    </div>
    <div class="summary-box expense-box">
      <h3>Total Expenses</h3>
      <p id="totalExpenseText">$0.00</p>
    </div>
    <div class="summary-box balance-box">
      <h3>Balance</h3>
      <p id="balanceText">$0.00</p>
    </div>
  </div>

  <div class="form-section">
    <h2>Add a new entry</h2>

    <div class="form-row">
      <label for="typeSelect">Type</label>
      <select id="typeSelect">
        <option value="expense">Expense</option>
        <option value="income">Income</option>
      </select>
    </div>

    <div class="form-row">
      <label for="descriptionInput">Description</label>
      <input type="text" id="descriptionInput" placeholder="e.g. Groceries">
    </div>

    <div class="form-row">
      <label for="amountInput">Amount ($)</label>
      <input type="number" id="amountInput" placeholder="e.g. 25.00" step="0.01">
    </div>

    <div class="form-row">
      <label for="categorySelect">Category</label>
      <select id="categorySelect">
        <option>Food</option>
        <option>Transport</option>
        <option>Housing</option>
        <option>Utilities</option>
        <option>Entertainment</option>
        <option>Salary</option>
        <option>Other</option>
      </select>
    </div>

    <button onclick="addEntry()">Add Entry</button>
  </div>

  <h2>All Entries</h2>
  <table>
    <thead>
      <tr>
        <th>Description</th>
        <th>Category</th>
        <th>Amount</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="entriesTableBody">
      <!-- Rows get added here automatically by JavaScript -->
    </tbody>
  </table>
  <div id="emptyMessage" class="empty-message">No entries yet. Add one above!</div>

</div>
</body>
<script src="script.js"></script>
</html>
